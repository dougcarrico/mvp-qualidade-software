<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Importanto Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Folha de estilos -->
    <link rel="stylesheet" href="styles/styles.css">

    <title>Predição de doença cardiaca</title>
</head>
<body>
    <!-- Cabeçalho do Sistema-->
     <header>
        <div class="title">
            <span class="site-name">Tem doença cardiaca?</span>
        </div>
     </header>

     <section>
        <p>Esta aplicação visa classificar se o paciente tem alguma doença cardiaca ou não. Preencha abaixo as informações obtidas com resultados de exames médicos.
        </p>
     </section>
     
     <!-- Campos para adição de um novo produto -->
     <section class="pacient-info">
        <div class="input-group">
            <label for="age-input">Idade (Anos)</label>
            <input type="number" id="age-input" placeholder="40" min="0" max="110">
        </div>

        <div class="input-group">
            <label for="sex-input">Gênero biológico</label>
            <select id="sex-input">
                <option value="0">Masculino</option>
                <option value="1">Feminino</option>
            </select>
        </div>

        <div class="input-group">
            <label for="chestPainType-input">Tipo de dor no peito</label>
            <select id="chestPainType-input">
                <option value="3">Angina típica</option>
                <option value="0">Angina atípica</option>
                <option value="1">Dor não anginosa</option>
                <option value="2">Assintomático</option>
            </select>
        </div>

        <div class="input-group">
            <label for="restingBP-input">Pressão arterial em repouso (mm Hg)</label>
            <input type="number" id="restingBP-input" placeholder="120">
        </div>

        <div class="input-group">
            <label for="fastingBS-input">Glicemia de jejum acima de 120 mg/dl?</label>
            <select id="fastingBS-input">
                <option value="1">Sim</option>
                <option value="0">Não</option>
            </select>
        </div>

        <div class="input-group">
            <label for="restingECG-input">Eletrocardiograma de repouso</label>
            <select id="restingECG-input">
                <option value="0">Normal</option>
                <option value="1">ST</option>
                <option value="2">LVH</option>
            </select>
        </div>

        <div class="input-group">
            <label for="maxHR-input">Frequência cardíaca máxima alcançada</label>
            <input type="number" id="maxHR-input" placeholder="130">
        </div>

        <div class="input-group">
            <label for="exerciseAngina-input">Angina de esforço</label>
            <select id="exerciseAngina-input">
                <option value="1">Sim</option>
                <option value="0">Não</option>
            </select>
        </div>

        <div class="input-group">
            <label for="oldpeak-input">Depressão do segmento ST</label>
            <input type="number" id="oldpeak-input" placeholder="0.0">
        </div> 



        <div class="input-group">
            <label for="stSlope-input">Inclinação do segmento ST</label>
            <select id="stSlope-input">
                <option value="0">Ascendente</option>
                <option value="1">Horizontal</option>
                <option value="2">Descendente</option>
            </select>
        </div>
     </section>

     <section class="analisis-container">
        <button onclick="analise()" class="button">Avaliar</button>
        <div id="outcome-wrapper" class="outcome-style">
            <h3>Resultado:</h3>
            <p id="outcome">Clique em avaliar para gerar um resultado</p>
        </div>
     </section>

     <div id="toast-wrapper">
     </div>

    <script src="scripts/script.js"></script>

</body>
</html>
